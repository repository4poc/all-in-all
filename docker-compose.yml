# Run Insrtuctions
# docker compose up/down/build
# docker compose build backendexpres (Only backendexpress)
services:
  backendexpress:
    build:
      context: ./backendexpress
    container_name: backendexpress
    ports:
      - "3000:3000"
    restart: unless-stopped

  backendpython:
    build:
      context: ./backendpython
    container_name: backendpython
    env_file:
      - ./backendpython/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NGINX_CONF: nginx.local.conf
    container_name: frontend
    env_file:
      - ./frontend/.env
    ports:
      - "80:80"
    depends_on:
      - backendexpress
    restart: unless-stopped
