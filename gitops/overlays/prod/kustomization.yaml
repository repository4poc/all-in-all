apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/namespaces
  - ../../base/apps
  - ../../base/backend

patches:
  - target:
      kind: Deployment
      name: apps-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

  - target:
      kind: Deployment
      name: backend-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

images:
  - name: myacr.azurecr.io/apps
    newTag: prod-latest
  - name: myacr.azurecr.io/backend
    newTag: prod-latest
