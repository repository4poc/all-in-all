apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/namespaces
  - ../../base/apps
  - ../../base/backend

# Smaller scale than prod but closer than dev
patches:
  - target:
      kind: Deployment
      name: apps-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: Deployment
      name: backend-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

# Test-specific image tags
images:
  - name: myacr.azurecr.io/apps
    newTag: test-latest
  - name: myacr.azurecr.io/backend
    newTag: test-latest
