name: backendpython CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "backendpython/**"
      - ".github/workflows/backendpython-ci.yaml"
      - "helm/backendpython/**"

  push:
    branches: ["main"]
    paths:
      - "backendpython/**"
      - ".github/workflows/backendpython-ci.yaml"
      - "helm/backendpython/**"

permissions:
  contents: read
  security-events: write
  packages: read

env:
  ACR_LOGIN_SERVER: allinallacr.azurecr.io
  IMAGE_NAME: backendpython
  NODE_VERSION: "20"

jobs:
  quality:
    name: Code quality and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backendpython
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backendpython/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck --if-present

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present -- --watch=false

      - name: Run npm audit
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  docker:
    name: Build, scan and push image
    runs-on: ubuntu-latest
    needs:
      - quality
      - codeql

    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Docker login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: backendpython
          file: backendpython/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/backendpython:${{ github.sha }}

      #      - name: Scan image with Trivy
      #        uses: aquasecurity/trivy-action@master
      #        with:
      #          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/backendpython:${{ github.sha }}
      #          format: sarif
      #          output: trivy-results.sarif
      #          severity: CRITICAL,HIGH
      #          exit-code: 1

      #      - name: Upload Trivy results to GitHub Security
      #        uses: github/codeql-action/upload-sarif@v3
      #        if: always()
      #        with:
      #          sarif_file: trivy-results.sarif

      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backendpython
          file: backendpython/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/backendpython:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/backendpython:main
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
