# .github/workflows/deploy.yml

name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  REGISTRY: myregistry.azurecr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # Backend
      - name: Build Backend
        run: docker build -t $REGISTRY/backend:${{ github.sha }} ./backend

      - name: Push Backend
        run: docker push $REGISTRY/backend:${{ github.sha }}

      # Frontend
      - name: Build Frontend
        run: docker build -t $REGISTRY/frontend:${{ github.sha }} ./frontend

      - name: Push Frontend
        run: docker push $REGISTRY/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: AKS Login
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RG }} \
            --name ${{ secrets.AKS_CLUSTER }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install my-app ./helm/my-app \
            --set backend.image=$REGISTRY/backend:${{ github.sha }} \
            --set frontend.image=$REGISTRY/frontend:${{ github.sha }}
