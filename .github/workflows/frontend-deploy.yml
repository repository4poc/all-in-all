name: Frontend Deploy to AKS

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "k8s/**"
      - ".github/workflows/frontend-deploy.yml"

env:
  REGISTRY: myregistry.azurecr.io
  APP_NAME: frontend
  NAMESPACE: all-in-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set environment variables
        run: |
          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "ACR_NAME=acrallinalldev" >> $GITHUB_ENV
            echo "AKS_NAME=aks-all-in-all-dev" >> $GITHUB_ENV
            echo "RESOURCE_GROUP=rg-all-in-all-dev" >> $GITHUB_ENV
            echo "OVERLAY=dev" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "test" ]; then
            echo "ENV_NAME=test" >> $GITHUB_ENV
            echo "ACR_NAME=acrallinalltest" >> $GITHUB_ENV
            echo "AKS_NAME=aks-all-in-all-test" >> $GITHUB_ENV
            echo "RESOURCE_GROUP=rg-all-in-all-test" >> $GITHUB_ENV
            echo "OVERLAY=test" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "stage" ]; then
            echo "ENV_NAME=stage" >> $GITHUB_ENV
            echo "ACR_NAME=acrallinallstage" >> $GITHUB_ENV
            echo "AKS_NAME=aks-all-in-all-stage" >> $GITHUB_ENV
            echo "RESOURCE_GROUP=rg-all-in-all-stage" >> $GITHUB_ENV
            echo "OVERLAY=stage" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "ACR_NAME=acrallinallprod" >> $GITHUB_ENV
            echo "AKS_NAME=aks-all-in-all-prod" >> $GITHUB_ENV
            echo "RESOURCE_GROUP=rg-all-in-all-prod" >> $GITHUB_ENV
            echo "OVERLAY=prod" >> $GITHUB_ENV
          else
            echo "Unsupported branch"
            exit 1
          fi

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # Frontend
      - name: Build Frontend
        run: docker build -t $REGISTRY/frontend:${{ github.sha }} ./frontend

      - name: Push Frontend
        run: docker push $REGISTRY/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: AKS Login
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RG }} \
            --name ${{ secrets.AKS_CLUSTER }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install my-app ./helm/my-app \
            --set backend.image=$REGISTRY/backend:${{ github.sha }} \
            --set frontend.image=$REGISTRY/frontend:${{ github.sha }}
