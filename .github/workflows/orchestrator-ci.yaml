name: Orchestrator CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "ai_agents/Orchestrator.Api/**"
      - ".github/workflows/orchestrator-ci.yaml"
      - "helm/orchestrator/**"

  push:
    branches: ["main"]
    paths:
      - "ai_agents/Orchestrator.Api/**"
      - ".github/workflows/orchestrator-ci.yaml"
      - "helm/orchestrator/**"

permissions:
  contents: read
  security-events: write
  packages: read

env:
  ACR_LOGIN_SERVER: allinallacr.azurecr.io
  IMAGE_NAME: orchestrator
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: ai_agents/Orchestrator.Api
  IMAGE_TAG: orchestrator

jobs:
  quality:
    name: Code quality, build and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./publish

  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Restore dependencies
        run: dotnet restore

      - name: Build for CodeQL
        run: dotnet build --configuration Release --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  docker:
    name: Build and push image
    runs-on: ubuntu-latest

    needs:
      - quality
      - codeql

    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Docker login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.PROJECT_PATH }}
          file: ${{ env.PROJECT_PATH }}/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_TAG }}:${{ github.sha }}

      # - name: Scan image with Trivy
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_TAG }}:${{ github.sha }}
      #     format: sarif
      #     output: trivy-results.sarif
      #     severity: CRITICAL,HIGH
      #     exit-code: 1

      # - name: Upload Trivy results to GitHub Security
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: trivy-results.sarif

      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.PROJECT_PATH }}
          file: ${{ env.PROJECT_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_TAG }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_TAG }}:main
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
