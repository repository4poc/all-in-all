apiVersion: apps/v1
kind: Deployment
metadata:
  name: apps-deployment
  namespace: apps
  labels:
    app: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apps

  template:
    metadata:
      labels:
        app: apps
        workload: apps

    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - apps
              topologyKey: "kubernetes.io/hostname"

      nodeSelector:
        workload: apps

      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "apps"
          effect: "NoSchedule"

      containers:
        - name: apps-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: VITE_AZURE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: VITE_AZURE_API_URL

            - name: VITE_AZURE_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: VITE_AZURE_MODEL_NAME

            - name: VITE_AZURE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: VITE_AZURE_API_KEY
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          # Resource requests and limits for better scheduling and resource management
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
