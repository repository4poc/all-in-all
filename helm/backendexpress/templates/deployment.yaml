apiVersion: apps/v1
kind: Deployment
metadata:
  name: backendexpress-deployment
  namespace: apps
  labels:
    app: backendexpress
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
    selector:
      matchLabels:
        app: backendexpress

  template:
    metadata:
      labels:
        app: backendexpress
        workload: apps

    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backendexpress
                topologyKey: "kubernetes.io/hostname"

      nodeSelector:
        workload: apps

      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "apps"
          effect: "NoSchedule"

      containers:
        - name: backendexpress
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default "main" }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
