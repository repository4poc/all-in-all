replicaCount: 3

image:
  tag: "PROD_IMAGE_TAG_REPLACED_BY_CI"

ingress:
  host: frontend.example.com

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10

pdb:
  enabled: true
  minAvailable: 1
