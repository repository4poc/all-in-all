apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: apps
  labels:
    app: qdrant
spec:
  serviceName: qdrant-headless
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
        workload: apps
    spec:
      nodeSelector:
        workload: apps

      tolerations:
        - key: workload
          operator: Equal
          value: apps
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - qdrant
                topologyKey: kubernetes.io/hostname

      securityContext:
        fsGroup: 1000

      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"

          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage

          readinessProbe:
            httpGet:
              path: /ready
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /live
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /live
              port: 6333
            periodSeconds: 10
            failureThreshold: 30

  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes:
          - ReadWriteMany # ReadWriteOnce, not shared among pods
        storageClassName: azurefile-csi
        resources:
          requests:
            storage: 5Gi
